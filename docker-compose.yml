services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_cont_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn ai_contact_hub.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./logs:/app/logs


  db:
    image: postgres:16-alpine
    container_name: ai_cont_db
    env_file:
      - .env
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10



  pg_admin:
    image: dpage/pgadmin4:8
    container_name: ai_cont_pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    mem_limit: 2g
    cpus: 0.5
    depends_on:
      - db


volumes:
  postgres_data:
